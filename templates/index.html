<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance OS</title>
    <style>
        :root {
            --bg: #05070a; --card: #0f172a; --primary: #00f2ff;
            --accent: #7000ff; --text: #e2e8f0; --subtext: #94a3b8;
            --success: #00ff88; --danger: #ff0055; --leave: #f1c40f;
        }
        
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-bottom: 80px; }
        
        .container { max-width: 1200px; margin: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 15px; background: var(--card); border-radius: 15px; border: 1px solid #1e293b; flex-wrap: wrap; gap: 10px; }
        
        .toggle-group { display: flex; background: #000; padding: 5px; border-radius: 10px; border: 1px solid #1e293b; }
        .toggle-btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; background: transparent; color: var(--subtext); font-weight: bold; }
        .toggle-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }

        /* Stats Cards */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .sub-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; }
        .sub-perc { font-size: 1.2rem; font-weight: 800; color: var(--primary); display: block; }

        /* Table */
        .table-wrap { background: var(--card); border-radius: 15px; overflow-x: auto; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { background: #000; padding: 15px; font-size: 0.7rem; color: var(--primary); border-bottom: 1px solid #1e293b; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #1e293b; }
        
        /* Leave Styles */
        .leave-select { background: #000; color: var(--leave); border: 1px solid #334155; border-radius: 4px; font-size: 0.7rem; padding: 3px; cursor: pointer; margin-top: 5px; width: 100%; }
        .row-cl { background: rgba(241, 196, 15, 0.1) !important; color: var(--leave); }
        .row-ml { background: rgba(0, 242, 255, 0.1) !important; color: var(--primary); }
        .today-row { border: 1px solid var(--primary) !important; box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }

        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid #334155; border-radius: 5px; cursor: pointer; display: inline-grid; place-content: center; }
        input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked::before { content: "✔"; color: #000; font-size: 12px; font-weight: 900; }
        input[type="checkbox"]:disabled { opacity: 0.2; cursor: not-allowed; }

        .badge { font-weight: 900; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; background: #000; border: 1px solid #334155; }
        .jump-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #000; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 100; }
    </style>
</head>
<body>

<button class="jump-btn" onclick="scrollToToday()">📅</button>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.2rem">ATTENDANCE SYSTEM v4.0</h1>
            <small style="color:var(--primary)">C1/C2 LEAVE TRACKER</small>
        </div>
        
        <div class="toggle-group">
            <button id="btnC1" class="toggle-btn active" onclick="switchSection('C1')">C1</button>
            <button id="btnC2" class="toggle-btn" onclick="switchSection('C2')">C2</button>
        </div>

        <div>
            <button onclick="exportData()" style="padding:8px; background:#1e293b; color:white; border:none; border-radius:5px; cursor:pointer;">💾 Backup</button>
        </div>
    </div>

    <div class="subject-grid" id="statsPanel"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>CALENDAR / LEAVE</th>
                    <th>I</th><th>II</th><th>III</th><th>IV</th><th>V</th><th>VI</th><th>VII</th>
                    <th>DAILY %</th>
                </tr>
            </thead>
            <tbody id="trackerTable"></tbody>
        </table>
    </div>
</div>

<script>
    let currentSection = 'C1';
    const startDate = new Date(2026, 2, 16);
    const endDate = new Date(2026, 3, 30);
    const todayStr = new Date().toDateString();

    const timetable = (day, sec) => {
        const s = {
            'Mon': ['BCE', 'EM-II', 'PHY', 'BME', 'LIB', sec === 'C1' ? 'CAMD Lab' : 'MPW', sec === 'C1' ? 'CAMD Lab' : 'MPW'],
            'Tue': ['BCE', 'EM-II', 'PHY', 'CS', 'LIB', sec === 'C2' ? 'CAMD Lab' : 'MPW', sec === 'C2' ? 'CAMD Lab' : 'MPW'],
            'Wed': ['BCE', 'EM-II', 'PHY', sec === 'C2' ? 'BCE Lab' : 'PHY Lab', sec === 'C1' ? 'PHY Lab' : 'BCE Lab', 'LIB', 'CS'],
            'Thu': ['BME', 'EM-II', 'PHY', 'CS', 'CRT', 'LANG LAB', 'LANG LAB'],
            'Fri': ['BME', 'EM-II', 'PHY', 'CRT', 'CRT', sec === 'C1' ? 'BCE Lab' : 'PHY Lab', sec === 'C2' ? 'PHY Lab' : 'BCE Lab']
        };
        return s[day] || null;
    };

    function switchSection(sec) {
        currentSection = sec;
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+sec).classList.add('active');
        render();
    }

    function render() {
        const tbody = document.getElementById('trackerTable');
        tbody.innerHTML = '';
        let curr = new Date(startDate);

        while (curr <= endDate) {
            const dKey = curr.toISOString().split('T')[0];
            const dName = curr.toLocaleDateString('en-GB', { weekday: 'short' });
            const schedule = timetable(dName, currentSection);
            const isToday = curr.toDateString() === todayStr;
            const leaveType = localStorage.getItem(`${currentSection}-${dKey}-leave`) || 'none';

            const row = document.createElement('tr');
            if (isToday) row.classList.add('today-row');
            if (leaveType === 'cl') row.classList.add('row-cl');
            if (leaveType === 'ml') row.classList.add('row-ml');

            let cells = `<td>
                <b>${curr.getDate()} ${curr.toLocaleDateString('en-GB',{month:'short'})}</b><br>
                <select class="leave-select" onchange="setLeave('${dKey}', this.value)">
                    <option value="none" ${leaveType==='none'?'selected':''}>Normal</option>
                    <option value="cl" ${leaveType==='cl'?'selected':''}>College Leave</option>
                    <option value="ml" ${leaveType==='ml'?'selected':''}>Medical Leave</option>
                </select>
            </td>`;
            
            for (let i = 0; i < 7; i++) {
                const sub = schedule ? schedule[i] : 'OFF';
                const sKey = `${currentSection}-${dKey}-s${i}`;
                const checked = localStorage.getItem(sKey) === 'true' ? 'checked' : '';
                const disabled = (leaveType !== 'none' || !schedule) ? 'disabled' : '';
                
                cells += `<td>
                    <div style="font-size:0.55rem; color:var(--subtext); margin-bottom:3px">${sub}</div>
                    <input type="checkbox" data-sub="${sub}" ${checked} ${disabled} onchange="save('${dKey}', ${i}, this.checked)">
                </td>`;
            }
            cells += `<td><span id="p-${dKey}" class="badge">${leaveType !== 'none' ? 'EXCLUDED' : '0%'}</span></td>`;
            row.innerHTML = cells;
            tbody.appendChild(row);
            updateRowPerc(dKey);
            curr.setDate(curr.getDate() + 1);
        }
        updateGlobalStats();
    }

    function setLeave(date, type) {
        localStorage.setItem(`${currentSection}-${date}-leave`, type);
        render(); // Refresh to update disabled states and calculations
    }

    function save(date, slot, val) {
        localStorage.setItem(`${currentSection}-${date}-s${slot}`, val);
        updateRowPerc(date);
        updateGlobalStats();
    }

    function updateRowPerc(date) {
        const leave = localStorage.getItem(`${currentSection}-${date}-leave`) || 'none';
        const el = document.getElementById(`p-${date}`);
        if (leave !== 'none') { el.innerText = "EXEMPT"; return; }
        
        const checks = Array.from(document.querySelectorAll(`input[onchange*="${date}"]`));
        if (checks.length === 0 || checks[0].disabled) { el.innerText = "-"; return; }
        const p = Math.round((checks.filter(c => c.checked).length / checks.length) * 100);
        el.innerText = p + "%";
    }

    function updateGlobalStats() {
        const subs = ['BCE', 'EM-II', 'PHY', 'BME', 'CS', 'CAMD Lab', 'MPW', 'BCE Lab', 'PHY Lab', 'CRT', 'LANG LAB'];
        const panel = document.getElementById('statsPanel');
        panel.innerHTML = '';
        
        subs.forEach(s => {
            // Only count checkboxes that are NOT in a leave-marked row
            const allPossible = Array.from(document.querySelectorAll(`input[data-sub="${s}"]`));
            const activeCheckboxes = allPossible.filter(c => !c.disabled);
            
            if (activeCheckboxes.length > 0) {
                const att = activeCheckboxes.filter(c => c.checked).length;
                const p = Math.round((att / activeCheckboxes.length) * 100);
                panel.innerHTML += `<div class="sub-card"><span style="font-size:0.65rem">${s}</span><span class="sub-perc">${p}%</span></div>`;
            }
        });
    }

    function scrollToToday() {
        const todayRow = document.querySelector('.today-row');
        if (todayRow) todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `attendance_backup.json`;
        a.click();
    }

    render();
    setTimeout(scrollToToday, 500);
</script>
</body>
</html>
